name: keepset
description: keepset - Audio Revolution.
publish_to: 'none'
version: 5.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5
  highlight_text: ^1.4.0
  clipboard: ^3.0.5
  sqflite: ^2.0.3+1
  intl: ^0.20.2
  flutter_staggered_grid_view: ^0.7.0
  iconsax: ^0.0.8
  permission_handler: ^12.0.1
  loading_indicator: ^3.0.1
  line_icons: ^2.0.1
  url_launcher: ^6.1.5
  flex_color_scheme: ^8.4.0
  sliding_sheet: ^0.5.2
  stop_watch_timer: ^3.2.2
  path_provider: ^2.0.8
  flutter_dotenv: ^6.0.0
  logger: ^2.6.2
  auto_size_text: ^3.0.0
  google_fonts: ^4.0.4
  sliding_up_panel: ^2.0.0+1
  glassmorphism: ^3.0.0
  fluentui_system_icons: ^1.1.184
  package_info_plus: ^4.2.0


  path: any
  flutter_local_notifications: any
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

dependency_overrides:
  win32: ^5.5.1
  package_info_plus: ^6.0.0

flutter:

  uses-material-design: true




  fonts:
    - family: Raleway
      fonts:
        - asset: assets/fonts/Raleway-Regular.ttf
        - asset: assets/fonts/Raleway-Light.ttf


    - family: poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf


  assets:
    - assets/images/
    - assets/cloud.json

